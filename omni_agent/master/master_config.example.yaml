# OmniFrame Agent Master — example configuration (Plan Section 7)
# Copy to %USERPROFILE%\.omniframe\master_config.yaml (Windows)
# or ~/.omniframe/master_config.yaml (POSIX dev).
#
# Phase E Setup Wizard writes this file on first run with header:
#   # Generated by Setup Wizard YYYY-MM-DD UTC
# Wizard-only flow also creates per-worker keys at:
#   %USERPROFILE%\.omniframe\agents\<worker-id>\agent_service_key.txt
# Resumable progress (mid-wizard) is stored at wizard_state.json (removed on Finish).

master:
  # Number of worker tiles [1..12]. Default 6 → 3×2 grid at 1280×800.
  workers: 6
  # Tk label refresh interval (ms). Lower bound 250 in Settings (Phase F).
  ui_refresh_ms: 1000
  # HTTP GET /health cadence per worker (ms).
  health_probe_interval_ms: 2000
  # On-disk log rotation retention (console ring buffer is in-memory, Phase C).
  log_retention_days: 7
  log_dir: "%USERPROFILE%\\.omniframe\\logs"
  # Used by Phase D "Launch SAPLogon" recovery action.
  sap_logon_path: "C:\\Program Files (x86)\\SAP\\FrontEnd\\SapGui\\saplogon.exe"
  # Blank = auto-detect OmniFrame_Agent.exe next to AgentMaster.exe.
  agent_exe_path: ""
  # Cap parallel subprocess spawns during Start All (COM init storm guard).
  parallel_spawn_concurrency: 2
  # Phase D Fix admin-gating when worker is mid-job.
  fix_admin_confirm_required: true
  # When true (default), workers refuse boot without a provisioned omni_sk_* key.
  # Set false to allow Supabase session fallback until keys are registered in Settings.
  require_service_keys: true

workers:
  - id: HOSTNAME-W1
    label: "Bay 1 — Outbound"
    sap_conn_idx: 0
    sap_session_index: 0
    auto_start: true
    health_port: 8765
    extra_env: {}
  - id: HOSTNAME-W2
    label: "Bay 2 — Inventory"
    sap_conn_idx: 0
    sap_session_index: 1
    auto_start: true
    health_port: 8766
    extra_env: {}
  - id: HOSTNAME-W3
    label: "Bay 3 — Putaway Confirm"
    sap_conn_idx: 0
    sap_session_index: 2
    auto_start: true
    health_port: 8767
    extra_env: {}
  - id: HOSTNAME-W4
    label: "Bay 4 — LT22 Imports"
    sap_conn_idx: 0
    sap_session_index: 3
    auto_start: true
    health_port: 8768
    extra_env: {}
  - id: HOSTNAME-W5
    label: "Bay 5 — LX25 / LT24"
    sap_conn_idx: 0
    sap_session_index: 4
    auto_start: true
    health_port: 8769
    extra_env: {}
  - id: HOSTNAME-W6
    label: "Bay 6 — Spare"
    sap_conn_idx: 0
    sap_session_index: 5
    auto_start: false
    health_port: 8770
    extra_env: {}
