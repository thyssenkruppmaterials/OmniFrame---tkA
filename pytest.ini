[pytest]
testpaths = api/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
markers =
    integration: marks tests as integration tests (may require infra)
    slow: marks tests as slow-running
    requires_infra: marks tests that require external services (Redis, DB)
addopts = -q --tb=short
filterwarnings =
    error::DeprecationWarning
    ; gotrue package is deprecated in favor of supabase_auth — transitive dep via supabase SDK
    ; Upstream: https://github.com/supabase/auth-py (renamed package, not yet updated in supabase-py)
    ; Review date: 2026-06-01 — re-evaluate if upstream has released supabase-py with auth-py rename
    ignore::DeprecationWarning:gotrue.*
    ; supabase SDK triggers internal deprecation warnings from transitive gotrue usage
    ; Review date: 2026-06-01 — re-evaluate alongside gotrue suppression
    ignore::DeprecationWarning:supabase.*
