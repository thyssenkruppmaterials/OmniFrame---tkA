[build]
builder = "DOCKERFILE"
# Railway automatically passes environment variables as build args
# when they are declared as ARG in the Dockerfile.
# `start.py` is the runtime entrypoint (`python start.py`); without it in
# this list, Railway silently SKIPS deploys when the only change is the
# entrypoint (see d3981825 "No changes to watched files").
watchPatterns = ["src/**", "api/**", "package.json", "pnpm-lock.yaml", "Dockerfile", "start.py"]

[deploy]
# CRITICAL: Force Python execution instead of static file serving
startCommand = "python start.py"
# Ensure Railway doesn't override with auto-detected commands
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/health"
healthcheckTimeout = 300

[[services]]
name = "onebox-ai-logistics"
port = 8000

