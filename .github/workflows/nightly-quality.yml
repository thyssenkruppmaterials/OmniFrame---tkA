name: Nightly Quality & Security

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily
  workflow_dispatch: {}

jobs:
  quality-scan:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint check
        id: lint
        run: pnpm lint:check 2>&1 | tee lint-output.txt; echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Lint ratchet
        id: ratchet
        run: node scripts/lint-ratchet.mjs 2>&1 | tee ratchet-output.txt; echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Format check
        id: format
        run: pnpm format:check 2>&1 | tee format-output.txt; echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Dependency audit
        id: audit
        run: pnpm audit --prod --audit-level=high 2>&1 | tee audit-output.txt; echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Exception leakage scan
        id: leakage
        run: |
          LEAKS=$(grep -rn 'detail=str(e)\|detail=f.*{str(e)}' api/ --include='*.py' || true)
          if [ -n "$LEAKS" ]; then
            echo "$LEAKS" > leakage-output.txt
            echo "exit_code=1" >> "$GITHUB_OUTPUT"
          else
            echo "No exception leakage found" > leakage-output.txt
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: Check-matrix alignment
        id: matrix
        run: node scripts/validate-check-matrix.mjs 2>&1 | tee matrix-output.txt; echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Build
        id: build
        run: pnpm build 2>&1 | tee build-output.txt; echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Bundle budget
        id: budget
        run: node scripts/check-bundle-budget.mjs 2>&1 | tee budget-output.txt; echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Unit tests
        id: tests
        run: pnpm test:unit 2>&1 | tee test-output.txt; echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Publish nightly summary
        if: always()
        run: |
          echo "### Nightly Quality & Security Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          for check in lint ratchet format audit leakage matrix build budget tests; do
            FILE="${check}-output.txt"
            if [ -f "$FILE" ] && ! grep -q "FAIL\|error\|exit_code=1" "$FILE"; then
              echo "| ${check} | ✅ |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| ${check} | ❌ |" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-quality-report-${{ github.run_number }}
          path: |
            *-output.txt
          retention-days: 30
