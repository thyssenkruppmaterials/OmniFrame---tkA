      #     $headers = @{
      #       "Authorization" = "Bearer $env:SUPABASE_SERVICE_ROLE_KEY"
      #       "x-upsert" = "true"
      #     }
      #     Invoke-RestMethod -Uri $url -Method Post -Headers $headers -InFile dist\OmniFrame_Agent.zip -ContentType "application/zip"
