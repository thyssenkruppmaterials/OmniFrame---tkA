[build]
builder = "DOCKERFILE"
watchPatterns = ["src/**", "Cargo.toml", "Dockerfile"]

[deploy]
startCommand = "./dashboard-service"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[[services]]
name = "drone-dashboard-service"
port = 8002
