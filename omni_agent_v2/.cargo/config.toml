# NOTE: We intentionally do NOT set `build.target = "x86_64-pc-windows-msvc"`
# here. The default-target would force every `cargo check`/`cargo test` run
# (including the local-host unit suite the developer runs on macOS) into a
# cross-link path that needs `lld-link` and the MSVC SDK — neither of which
# the macOS dev box has. Instead, callers pass `--target x86_64-pc-windows-msvc`
# explicitly when they want a Windows syntax-check, and the host-default
# (`aarch64-apple-darwin` on M-series Macs, `x86_64-unknown-linux-gnu` on CI)
# stays usable for unit tests + clippy.

# Quieter incremental builds on macOS — the default `incremental=true` is
# kept, but parallelism is capped so a 6-crate `cargo check --workspace`
# doesn't OOM a laptop running other workloads.
[build]
jobs = 4

[net]
git-fetch-with-cli = true
